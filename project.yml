name: FlightReel
options:
  bundleIdPrefix: com.flightreel
  deploymentTarget:
    macOS: "15.0"

targets:
  FlightReel:
    type: application
    platform: macOS
    sources:
      - path: Sources/FlightReel
        excludes:
          - "FlightReel.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flightreel.FlightReel
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Sources/FlightReel/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/FlightReel/FlightReel.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
